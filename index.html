<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="mobileControls">
            <div class="control-group left-controls">
                <button id="btnLeft" class="control-btn">Left</button>
                <button id="btnRight" class="control-btn">Right</button>
            </div>
            <div class="control-group right-controls">
                <button id="btnBrake" class="control-btn">Brake</button>
                <button id="btnAccel" class="control-btn">Accel</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
